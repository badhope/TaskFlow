name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: |
          if npm run build:web; then
            echo "expo export succeeded"
          else
            echo "::warning::expo export failed, using fallback index.html"
            mkdir -p dist
            cp scripts/fallback-index.html dist/index.html
          fi

      - name: Inject no-cache meta + cache-buster into index.html
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html does not exist"
            ls -la dist/ 2>/dev/null || echo "no dist dir"
            exit 1
          fi
          echo "=== BEFORE ==="
          head -20 dist/index.html
          echo ""
          echo "=== RUNNING INLINE NODE SCRIPT ==="
          node -e "
            const fs = require('fs');
            const path = 'dist/index.html';
            const ts = String(Date.now());
            let html = fs.readFileSync(path, 'utf8');
            const metaTags = [
              '<meta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\">',
              '<meta http-equiv=\"Pragma\" content=\"no-cache\">',
              '<meta http-equiv=\"Expires\" content=\"0\">',
              '<meta name=\"build-timestamp\" content=\"' + ts + '\">',
            ].join('\n  ');
            html = html.replace(/<head>/i, '<head>\n  ' + metaTags);
            html = html.replace(/(src|href)=\"(\/TaskFlow\/(?:_expo|assets)\/[^\"]+)\"/g, (m, attr, url) => {
              if (url.includes('?v=')) return m;
              const sep = url.includes('?') ? '&' : '?';
              return attr + '=\"' + url + sep + 'v=' + ts + '\"';
            });
            fs.writeFileSync(path, html);
            console.log('OK, ts=' + ts);
          "
          echo "=== AFTER ==="
          head -20 dist/index.html
          echo "=== SCRIPT TAG ==="
          grep -E 'script src' dist/index.html || echo "NO SCRIPT TAG"

      - name: Verify dist exists
        run: |
          if [ ! -f dist/index.html ]; then
            echo "::error::dist/index.html missing after build"
            exit 1
          fi
          echo "dist size: $(du -sh dist | cut -f1)"
          echo "first 5 entries:"
          ls -la dist | head -5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
