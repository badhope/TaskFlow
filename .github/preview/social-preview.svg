<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.3"/>
      <feComposite in2="off" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>

  <g opacity="0.15">
    <circle cx="180" cy="120" r="160" fill="#ffffff"/>
    <circle cx="1140" cy="540" r="200" fill="#ffffff"/>
    <circle cx="1080" cy="100" r="80" fill="#ffffff"/>
    <circle cx="220" cy="540" r="100" fill="#ffffff"/>
  </g>

  <g transform="translate(120, 180)" filter="url(#shadow)">
    <rect x="0" y="0" width="280" height="280" rx="60" fill="url(#card)" stroke="#ffffff" stroke-width="2" stroke-opacity="0.3"/>
    <g transform="translate(70, 70)">
      <rect x="0" y="0" width="140" height="140" rx="32" fill="#ffffff"/>
      <path d="M 35 30 L 60 75 L 110 75 L 70 105 L 85 150 L 35 120 L -15 150 L 0 105 L -40 75 L 10 75 Z"
            fill="#3b82f6" transform="translate(35, -10) scale(0.7)"/>
      <path d="M 30 70 L 55 70 L 55 90 L 75 90 L 75 110 L 30 110 Z" fill="#1e293b" transform="translate(40, 0) scale(0.5)"/>
      <rect x="35" y="65" width="10" height="10" fill="#10b981" transform="translate(60, 0)"/>
    </g>
  </g>

  <g transform="translate(480, 180)">
    <text x="0" y="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="100" font-weight="800" fill="#ffffff">TaskFlow</text>
    <text x="0" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" font-weight="500" fill="#ffffff" opacity="0.85">现代化 · 跨平台 · Todo &amp; 任务管理</text>

    <g transform="translate(0, 160)">
      <g>
        <rect x="0" y="0" width="200" height="56" rx="28" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.4"/>
        <text x="100" y="36" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Web</text>
      </g>
      <g transform="translate(220, 0)">
        <rect x="0" y="0" width="200" height="56" rx="28" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.4"/>
        <text x="100" y="36" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Android</text>
      </g>
      <g transform="translate(440, 0)">
        <rect x="0" y="0" width="200" height="56" rx="28" fill="#ffffff" fill-opacity="0.18" stroke="#ffffff" stroke-opacity="0.4"/>
        <text x="100" y="36" text-anchor="middle" font-family="-apple-system, sans-serif" font-size="22" font-weight="600" fill="#ffffff">iOS</text>
      </g>
    </g>

    <g transform="translate(0, 280)" font-family="-apple-system, sans-serif" font-size="20" fill="#ffffff" opacity="0.75">
      <text x="0" y="0">✨  AI 智能建议  ·  Forest 风格专注模式  ·  白噪声  ·  @ 提及  ·  拖拽重排</text>
    </g>
  </g>
</svg>
