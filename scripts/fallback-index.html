<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Todo App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #3B82F6; margin-bottom: 20px; font-size: 32px; }
        .info { color: #64748b; margin-bottom: 25px; line-height: 1.6; }
        .button {
            display: inline-block;
            background: #3B82F6;
            color: white;
            padding: 12px 24px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            margin-right: 10px;
            transition: transform 0.2s;
        }
        .button:hover { transform: translateY(-2px); background: #2563eb; }
        .button-secondary { background: #64748b; }
        .button-secondary:hover { background: #475569; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TaskFlow</h1>
        <div class="info">
            <p><strong>Welcome to TaskFlow!</strong></p>
            <p>This is a beautiful todo app built with React Native &amp; Expo.</p>
            <p><strong>To use the full app:</strong></p>
            <p>1. Run locally with <code>npm start</code> and use Expo Go</p>
            <p>2. Or build the APK with the instructions in the repo</p>
        </div>
        <a href="https://github.com/badhope/TaskFlow" class="button" target="_blank">View on GitHub</a>
        <a href="https://expo.dev/" class="button button-secondary" target="_blank">Learn Expo</a>
    </div>
</body>
</html>
